<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifikáty - Moje Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #0a0f1c;
            color: white;
            font-size: 28px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .certificates-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .certificates-gallery img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 5px;
            transition: transform 0.3s ease-in-out;
        }

        .certificates-gallery img:hover {
            transform: scale(1.2);
        }

        .description {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #0a0f1c;
            color: white;
            border-radius: 10px;
            max-width: 950px;
            margin-left: auto;
            margin-right: auto;
            font-size: 18px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0a500;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #e08d00;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Certifikáty</h1>
        <p>Tu nájdete moje certifikáty a odborné školenia.</p>

        <div class="description">
            <h2>Popis certifikátov</h2>
            <p>Tu sú certifikáty, ktoré som získal v rôznych oblastiach, ako je IT, technológie, a ďalšie.</p>
        </div>

        <div class="certificates-gallery">
            <img src="2024.jpg" alt="Certifikát 1">
            <img src="2025.jpg" alt="Certifikát 2">
            <img src="hybridapps.jpg" alt="Certifikát 3">
            <img src="ajc1.jpg" alt="Certifikát 4">
            <!-- Pridajte ďalšie certifikáty podľa potreby -->
        </div>

        <a href="index.html" class="btn">Späť na hlavnú stránku</a>
    </div>
</body>

</html>
