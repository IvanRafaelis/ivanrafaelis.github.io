<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publikácie - Moje Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #0a0f1c;
            color: white;
            font-size: 28px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .publications-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .publications-gallery img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 5px;
            transition: transform 0.3s ease-in-out;
        }

        .publications-gallery img:hover {
            transform: scale(1.2);
        }

        .description {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #0a0f1c;
            color: white;
            border-radius: 10px;
            max-width: 950px;
            margin-left: auto;
            margin-right: auto;
            font-size: 18px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0a500;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #e08d00;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Publikácie</h1>
        <p>Tu nájdete publikácie, ktoré som napísal ako študent.</p>

        <div class="description">
            <h2>Popis publikácií</h2>
            <p>V tejto sekcii sú zverejnené publikácie, ktoré som vytvoril počas svojho štúdia na strednej škole. Zameriavam sa na rôzne oblasti, vrátane IT, technológií a ďalších tém.</p>
        </div>

        <div class="publications-gallery">
            <img src="publikacia1.png" alt="Publikácia 1">
            <img src="publikacia2.png" alt="Publikácia 2">
            <img src="publikacia3.png" alt="Publikácia 3">
            <img src="publikacia4.png" alt="Publikácia 4">
            <img src="publikacia6.png" alt="Publikácia 6">
            <img src="publikacia5.png" alt="Publikácia 5">
        </div>

        <a href="index.html" class="btn">Späť na hlavnú stránku</a>
    </div>
</body>

</html>
